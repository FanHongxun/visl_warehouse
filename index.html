<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>各仓与整合仓关系可视化图表</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

        * {

            padding: 0;

        body {

        }
        #map {
            height: 100vh;
            width: 100%;
            z-index: 1;
            background: #eef2f5;
        }
        /* 交互信息面板 */
        .info-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            color: white;
            padding: 10px 16px;
            border-radius: 28px;
            font-size: 13px;
            font-family: monospace;
            z-index: 1000;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            pointer-events: none;
            border-left: 4px solid #ff9800;
        }
        /* 统计面板 */
        .stats-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            padding: 12px 18px;
            border-radius: 16px;
            color: #f0f0f0;
            font-size: 13px;
            line-height: 1.5;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-right: 3px solid #ff9800;
            pointer-events: none;
            min-width: 200px;
        }
        .stats-panel h4 {
            margin: 0 0 8px 0;
            font-size: 15px;
            font-weight: 600;
            color: #ffaa66;
            text-align: center;
        }
        .stats-panel p {
            margin: 4px 0;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }
        .legend-dot {
            width: 14px;
            height: 14px;
            background: #ff8c42;
            border-radius: 50%;
            border: 1px solid white;
        }
        .legend-line {
            width: 30px;
            height: 3px;
            background: #3b82f6;
            border-radius: 2px;
        }
        .map-title {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            pointer-events: none;
            box-shadow: 0 1px 6px rgba(0,0,0,0.2);
        }
        @media (max-width: 600px) {
            .stats-panel { font-size: 10px; padding: 8px 12px; min-width: 170px; }
            .info-panel { font-size: 10px; padding: 6px 12px; }
            .map-title { font-size: 10px; top: 10px; left: 10px; }
        }
        .custom-popup .leaflet-popup-content-wrapper {
            background: #2c2c2c;
            color: #f5f5f5;
            border-radius: 12px;
            border-left: 4px solid #ff8c42;
        }
        .warehouse-tooltip {
            background: rgba(0,0,0,0.8);
            border: 1px solid #ff8c42;
            border-radius: 6px;
            color: #ffdd99;
            font-size: 12px;
            padding: 4px 10px;
            white-space: nowrap;
        }
        .province-tooltip {
            background: rgba(0,0,0,0.7);
            color: #ffdd99;
            border-radius: 4px;
            font-size: 12px;
            padding: 2px 6px;
            border: 1px solid #ffaa66;
        }
        .loading-tip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 2000;
            font-size: 14px;
            pointer-events: none;
        }

            background: white;
            width: 34px;
            height: 34px;
            border-radius: 4px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            cursor: pointer;
            text-align: center;
            line-height: 34px;
            font-size: 20px;
            transition: all 0.2s;
        }

            background: #f0f0f0;

</head>

        // ======================= 4. 创建仓库标记 =======================
        const markersGroup = L.layerGroup().addTo(map);
        const markerMap = new Map();

        warehouses.forEach(wh => {
            const isHub = hubNames.includes(wh.name);
            const radius = isHub ? 13 : 7;
            const fillColor = isHub ? '#e34234' : '#ff8c42';
            const circle = L.circleMarker([wh.lat, wh.lng], {
                radius: radius,
                fillColor: fillColor,
                color: '#ffffff',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.9
            }).addTo(markersGroup);

            circle.bindTooltip(wh.name, { permanent: false, direction: 'top', offset: [0, -8], className: 'warehouse-tooltip' });
            let popupHtml = `<div><strong>${wh.name}</strong><br>📍 ${wh.lat.toFixed(4)}, ${wh.lng.toFixed(4)}`;
            if (isHub) popupHtml += `<br>🏢 整合仓 (管理下级仓库)`;
            popupHtml += `</div>`;
            circle.bindPopup(popupHtml, { maxWidth: 260, className: 'custom-popup' });

            markerMap.set(wh.name, circle);
        });

        // ======================= 5. 创建线条（无箭头） =======================
        const allLines = [];
        const childLineMap = new Map();
        const hubLinesMap = new Map();

        function getCoordByName(name) {
            const wh = warehouses.find(w => w.name === name);
            return wh ? [wh.lat, wh.lng] : null;
        }

        for (let [child, { parent, time }] of parentMap.entries()) {
            const childCoord = getCoordByName(child);
            const parentCoord = getCoordByName(parent);
            if (!childCoord || !parentCoord) continue;

            // 线条
            const line = L.polyline([childCoord, parentCoord], {
                color: '#3b82f6',
                weight: 2.5,
                opacity: 0,
                lineCap: 'round',
                interactive: false
            }).addTo(map);
            allLines.push(line);
            childLineMap.set(child, line);

            if (!hubLinesMap.has(parent)) hubLinesMap.set(parent, []);
            hubLinesMap.get(parent).push(line);

            // 子仓弹窗增加时间
            const childMarker = markerMap.get(child);
            if (childMarker) {
                childMarker.bindPopup(`<div><strong>${child}</strong><br>📍 ${childCoord[0].toFixed(4)}, ${childCoord[1].toFixed(4)}<br>🚛 至整合仓: ${parent}<br>⏱️ 行驶时间: ${time} 小时</div>`, { maxWidth: 260, className: 'custom-popup' });
            }
        });

        // 整合仓弹窗增加下级列表
        for (let hub of hubNames) {
            const children = hubToChildren.get(hub);
            if (children && children.length > 0) {
                const hubMarker = markerMap.get(hub);
                if (hubMarker) {
                    const childList = children.map(c => `• ${c} (${parentMap.get(c).time}h)`).join('<br>');
                    hubMarker.bindPopup(`<div><strong>${hub}</strong><br>📍 整合仓<br>📦 管理 ${children.length} 个下级仓库:<br>${childList}</div>`, { maxWidth: 280, className: 'custom-popup' });
                }
            }
        }

        // ======================= 6. 交互逻辑 =======================
        function hideAllLines() {
            allLines.forEach(line => line.setStyle({ opacity: 0 }));
        }

        function showLines(linesToShow) {
            if (!linesToShow) return;
            if (Array.isArray(linesToShow)) {
                linesToShow.forEach(line => line.setStyle({ opacity: 0.85 }));
            } else {
                linesToShow.setStyle({ opacity: 0.85 });
            }
        }

        // 一键显示所有线路
        function showAllLines() {
            hideAllLines();
            allLines.forEach(line => line.setStyle({ opacity: 0.85 }));
            const panel = document.getElementById('coordPanel');
            if (panel) {
                const mouseInfo = panel.innerHTML.split('<br>📍 最后点击:')[0];
                panel.innerHTML = `${mouseInfo}<br>📍 最后点击: 已显示全部线路 (${allLines.length}条)`;
            }
        }

        // 仓库点击事件
        warehouses.forEach(wh => {
            const marker = markerMap.get(wh.name);
            if (!marker) return;

            marker.on('click', () => {
                hideAllLines();
                if (hubNames.includes(wh.name)) {
                    const linesArray = hubLinesMap.get(wh.name);
                    if (linesArray && linesArray.length) {
                        showLines(linesArray);
                        const panel = document.getElementById('coordPanel');
                        if (panel) {
                            const mouseInfo = panel.innerHTML.split('<br>📍 最后点击:')[0];
                            panel.innerHTML = `${mouseInfo}<br>📍 最后点击: ${wh.name} (整合仓，显示${linesArray.length}条连线)`;
                        }
                    } else {
                        const panel = document.getElementById('coordPanel');
                        if (panel) {
                            const mouseInfo = panel.innerHTML.split('<br>📍 最后点击:')[0];
                            panel.innerHTML = `${mouseInfo}<br>📍 最后点击: ${wh.name} (无下级仓库)`;
                        }
                    }
                } else {
                    const line = childLineMap.get(wh.name);
                    if (line) {
                        showLines(line);
                        const parentInfo = parentMap.get(wh.name);
                        const panel = document.getElementById('coordPanel');
                        if (panel) {
                            const mouseInfo = panel.innerHTML.split('<br>📍 最后点击:')[0];
                            panel.innerHTML = `${mouseInfo}<br>📍 最后点击: ${wh.name} → ${parentInfo.parent} (${parentInfo.time}h)`;
                        }
                    } else {
                        const panel = document.getElementById('coordPanel');
                        if (panel) {
                            const mouseInfo = panel.innerHTML.split('<br>📍 最后点击:')[0];
                            panel.innerHTML = `${mouseInfo}<br>📍 最后点击: ${wh.name} (无关联线条)`;
                        }
                    }
                }
            });
        });

        // ======================= 7. 鼠标坐标与地图点击 =======================
        const coordPanel = document.getElementById('coordPanel');
        map.on('mousemove', function(e) {
            const lat = e.latlng.lat.toFixed(5);
            const lng = e.latlng.lng.toFixed(5);
            if (coordPanel) {
                const clickPart = coordPanel.innerHTML.split('<br>📍 最后点击:')[1];

            }

            const lat = e.latlng.lat.toFixed(5);
            const lng = e.latlng.lng.toFixed(5);
            if (coordPanel) {
                const mousePart = coordPanel.innerHTML.split('<br>📍 最后点击:')[0];
                coordPanel.innerHTML = `${mousePart}<br>📍 最后点击: 地图 [${lat}, ${lng}]`;

        // 重置视图
        const resetViewBtn = L.Control.extend({

            onAdd: () => {
                const btn = L.DomUtil.create('div', 'custom-control-btn');
                btn.innerHTML = '🗺️';
                btn.title = '重置视图';
                btn.onclick = () => { map.setView([35.0, 105.0], 5); hideAllLines(); };

            }

        const toggleMarkersBtn = L.Control.extend({
            options: { position: 'topright' },
            onAdd: () => {
                const btn = L.DomUtil.create('div', 'custom-control-btn');
                btn.innerHTML = '🏷️';
                btn.title = '显示/隐藏仓库标记';
                let visible = true;
                btn.onclick = () => {
                    if (visible) { map.removeLayer(markersGroup); visible = false; btn.style.opacity = '0.7'; }

                return btn;

        map.addControl(new toggleMarkersBtn());

        // 一键显示所有线路
        const showAllLinesBtn = L.Control.extend({
            options: { position: 'topright' },
            onAdd: () => {
                const btn = L.DomUtil.create('div', 'custom-control-btn');
                btn.innerHTML = '🔗';

        const fullscreenBtn = L.Control.extend({
            options: { position: 'topright' },
            onAdd: () => {
                const btn = L.DomUtil.create('div', 'custom-control-btn');
                btn.innerHTML = '⛶';
                btn.title = '全屏模式';
                btn.onclick = () => { const elem = document.documentElement; if (elem.requestFullscreen) elem.requestFullscreen(); };
                return btn;
            }
        });
        map.addControl(new fullscreenBtn());

        setTimeout(() => {
            L.popup({ closeButton: true, autoClose: 4000 })

        }, 1000);

        window.addEventListener('resize', () => map.invalidateSize());
        console.log('✅ 地图加载完成，共42个仓库，7个整合仓，35条供应关系');
